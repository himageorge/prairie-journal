<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #f5f2ec;
  --panel:     #fefdfa;
  --sidebar:   #1e2328;
  --sb-hover:  #2a3038;
  --sb-active: #2e3a28;
  --sb-border: #2f353d;
  --accent:    #4a7c59;
  --accent2:   #6aab80;
  --accent-lt: #ddf0e3;
  --gold:      #c89b3c;
  --gold-lt:   #fef6e0;
  --red:       #c0392b;
  --red-lt:    #fdecea;
  --text:      #1a1e24;
  --text2:     #4a5568;
  --text3:     #8a97a8;
  --sb-text:   #c8d0da;
  --sb-text2:  #7a8798;
  --sb-text3:  #4a5568;
  --border:    #ddd8cf;
  --border2:   #e8e3da;
  --mono:      'JetBrains Mono', monospace;
  --serif:     'Fraunces', serif;
  --radius:    6px;
  --radius2:   10px;
  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
}

html, body {
  width: 100%;
  height: 100%;
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── SHELL ── */
.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
}

/* ── TITLEBAR ── */
.titlebar {
  background: var(--sidebar);
  border-bottom: 1px solid var(--sb-border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  height: 44px;
  flex-shrink: 0;
  user-select: none;
}
.logo-mark {
  width: 26px; height: 26px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  box-shadow: 0 0 10px rgba(74,124,89,0.4);
  flex-shrink: 0;
}
.logo-text { flex: 1; }
.logo-name {
  font-family: var(--serif);
  font-size: 13px; font-weight: 500; color: #fff;
  letter-spacing: -0.2px; display: block; line-height: 1.2;
}
.logo-sub {
  font-family: var(--mono);
  font-size: 9px; color: var(--sb-text2);
  letter-spacing: 1px; text-transform: uppercase;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 6px rgba(106,171,128,0.6);
  animation: pulse 2s infinite; flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── CONTEXT BAR ── */
.context-bar {
  background: var(--sidebar);
  border-bottom: 1px solid var(--sb-border);
  padding: 8px 14px;
  flex-shrink: 0;
}
.context-bar-label {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--sb-text3); margin-bottom: 6px;
}
.context-chips {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.ctx-chip {
  font-size: 10px; font-family: var(--mono);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 4px; padding: 2px 7px; color: var(--sb-text2);
  transition: all var(--transition);
}
.ctx-chip.filled {
  background: var(--sb-active);
  border-color: rgba(74,124,89,0.4);
  color: #aee6b8;
}
.ctx-chip.editable {
  cursor: pointer;
}
.ctx-chip.editable:hover {
  background: var(--sb-hover);
  color: var(--sb-text);
}

/* ── TAB BAR ── */
.tab-bar {
  display: flex; gap: 0;
  background: var(--sidebar);
  border-bottom: 1px solid var(--sb-border);
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 9px 8px;
  font-size: 11px; font-family: var(--mono);
  color: var(--sb-text3); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  text-align: center;
  letter-spacing: 0.3px;
}
.tab:hover { color: var(--sb-text); background: var(--sb-hover); }
.tab.active { color: #aee6b8; border-bottom-color: var(--accent); background: var(--sb-active); }

/* ── SCROLLABLE BODY ── */
.tab-body {
  flex: 1; overflow-y: auto;
  display: none;
}
.tab-body.active { display: flex; flex-direction: column; }
.tab-body::-webkit-scrollbar { width: 4px; }
.tab-body::-webkit-scrollbar-track { background: transparent; }
.tab-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── WRITE TAB ── */
.write-section { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

.field-label {
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.5px; margin-bottom: 4px;
  display: flex; align-items: center; gap: 5px;
}
.field-label .emoji { font-size: 11px; }

.field-textarea {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 11px;
  font-family: var(--mono);
  font-size: 12px; color: var(--text);
  resize: vertical; min-height: 72px;
  outline: none; line-height: 1.6;
  transition: border-color var(--transition);
}
.field-textarea:focus { border-color: var(--accent); }
.field-textarea.short { min-height: 44px; }

/* SELECTORS ROW */
.selectors-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.sel-wrap { display: flex; flex-direction: column; gap: 3px; }
.sel-label { font-size: 9px; color: var(--text3); letter-spacing: 0.5px; }
.ctx-select {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 8px;
  font-family: var(--mono);
  font-size: 11px; color: var(--text2);
  outline: none;
  transition: border-color var(--transition);
  cursor: pointer;
}
.ctx-select:focus { border-color: var(--accent); }

/* SCREENSHOT AREA */
.screenshot-area { display: flex; flex-direction: column; gap: 6px; }
.screenshot-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  cursor: pointer; transition: all var(--transition);
  width: 100%;
}
.screenshot-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
.screenshot-btn .icon { font-size: 13px; }
.screenshot-preview {
  width: 100%; border-radius: var(--radius);
  border: 1px solid var(--border);
  display: none;
}
.screenshot-preview.visible { display: block; }

/* ACTION BUTTONS */
.action-row {
  display: flex; gap: 8px;
  padding: 0 14px 14px;
  flex-shrink: 0;
}
.btn {
  flex: 1; padding: 9px 14px;
  border-radius: var(--radius);
  font-family: var(--mono); font-size: 12px;
  cursor: pointer; transition: all var(--transition);
  font-weight: 500; letter-spacing: 0.2px;
}
.btn-primary {
  background: var(--accent); border: 1px solid var(--accent); color: #fff;
}
.btn-primary:hover { background: #3d6649; border-color: #3d6649; }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  background: var(--panel); border: 1px solid var(--border); color: var(--text2);
}
.btn-secondary:hover { border-color: var(--text3); color: var(--text); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--sidebar); color: #aee6b8;
  font-family: var(--mono); font-size: 11px;
  padding: 7px 16px; border-radius: 20px;
  border: 1px solid var(--sb-border);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  z-index: 9999; opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border2); margin: 2px 0; }
</style>
</head>
<body>

<div class="shell" id="mainView">

  <!-- ── TITLEBAR ── -->
  <div class="titlebar">
    <div class="logo-mark">PL</div>
    <div class="logo-text">
      <span class="logo-name">PL Journal</span>
      <span class="logo-sub">mistake tracker</span>
    </div>
    <div class="sync-dot" id="syncDot" title="Storage active"></div>
  </div>

  <!-- ── CONTEXT BAR (auto-filled from page) ── -->
  <div class="context-bar">
    <div class="context-bar-label">Current Page</div>
    <div class="context-chips">
      <span class="ctx-chip" id="ctxCourse">Course —</span>
      <span class="ctx-chip" id="ctxModule">Module —</span>
      <span class="ctx-chip" id="ctxQuestion">Question —</span>
      <span class="ctx-chip" id="ctxVariant">Variant —</span>
    </div>
  </div>


  <!-- ══════════════════════════════════════════ WRITE TAB ══ -->
  <div class="tab-body active" id="tab-write">
    <div class="write-section">

      <div class="divider"></div>

      <!-- Reflection -->
      <div>
        <div class="field-label"><span class="emoji">📝</span> Reflection — Why did you get it wrong?</div>
        <textarea class="field-textarea" id="inputReflection"
          placeholder="e.g. I forgot to consider the base case in my recursion. The function kept calling itself without stopping because I didn't check the n === 0 condition…"></textarea>
      </div>

      <!-- Quick Note -->
      <div>
        <div class="field-label"><span class="emoji">⚡</span> Quick Note — Key takeaway</div>
        <textarea class="field-textarea short" id="inputNote"
          placeholder="e.g. Always check base case first."></textarea>
      </div>

      <!-- Screenshot -->
      <div class="screenshot-area">
        <div class="field-label"><span class="emoji">📷</span> Screenshot</div>
        <button class="screenshot-btn" id="captureSsBtn">
          <span class="icon">📷</span> Capture current tab view
        </button>
        <img class="screenshot-preview" id="screenshotPreview" alt="Screenshot">
        <button class="screenshot-btn" id="clearSsBtn" style="display:none;color:var(--red)">
      </div>

    </div><!-- /write-section -->
    <div id="aiResponseBox" style="margin: 0 14px 14px; padding: 12px; background: var(--gold-lt); border: 1px solid var(--gold); border-radius: var(--radius); display: none;">
      <div style="font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 4px; letter-spacing: 0.5px;">SOCRATIC HINT</div>
      <div id="aiText" style="font-size: 11px; line-height: 1.4; color: var(--text);"></div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-row">
      <button class="btn btn-secondary" id="clearFormBtn">Clear</button>
      <button class="btn btn-primary"   id="saveBtn">Save</button>
      <button class="btn btn-secondary" id="dashBtn">Dashboard →</button>
    </div>

  </div><!-- /tab-write -->

</div><!-- /mainView -->

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- <script src="config.js"></script> -->
<script type="module" src="sidepanel.js"></script>
</body>
</html>
